<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Matrículas Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icono.png">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #334155;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flash-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
            z-index: 10;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            box-sizing: border-box;
            letter-spacing: 0.1em;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background var(--primary-hover) 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .gallery {
            margin-top: 24px;
            border-top: 1px solid #334155;
            padding-top: 16px;
        }

        .gallery-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .thumb-container {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #475569;
            background: #000;
        }

        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 9px;
            text-align: center;
            padding: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Control de Matrículas</h1>
    <div class="subtitle">Captura fotos organizadas por Año y Matrícula</div>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="flash" class="flash-effect"></div>
    </div>

    <div class="input-group">
        <label for="matricula">Matrícula del Vehículo</label>
        <input type="text" id="matricula" placeholder="EJ: 1234ABC" maxlength="10">
    </div>

    <button id="capture-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Tomar Foto y Guardar en Equipo
    </button>

    <div class="gallery">
        <div class="gallery-title">Miniaturas Guardadas</div>
        <div id="grid" class="grid"></div>
    </div>
</div>

<canvas id="canvas" style="display: none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const matriculaInput = document.getElementById('matricula');
    const flash = document.getElementById('flash');
    const grid = document.getElementById('grid');

    // Inicializar cámara
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: { ideal: "environment" },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            });
            video.srcObject = stream;
        } catch (err) {
            try {
                const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = fallbackStream;
            } catch (fallbackErr) {
                alert("Error al activar la cámara. Asegúrate de otorgar permisos y abrir la web usando HTTPS.");
            }
        }
    }

    function triggerFlash() {
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 150);
    }

    // Proceso de captura y envío al servidor local del equipo
    captureBtn.addEventListener('click', async () => {
        let matriculaText = matriculaInput.value.trim().toUpperCase() || "SIN_MATRICULA";
        matriculaText = matriculaText.replace(/[^A-Z0-9_-]/g, ""); 

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        triggerFlash();

        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        
        const ahora = new Date();
        const anio = ahora.getFullYear(); 
        const hora = ahora.toTimeString().split(' ')[0].replace(/:/g, '-');

        const nombreCarpetaAnio = `fotos ${anio}`;
        const nombreArchivo = `${matriculaText}_${hora}.jpg`; 

        // --- SISTEMA DE ENVÍO POR RED LOCAL (IP MODIFICADA) ---
        try {
            // Convertimos la imagen base64 (dataUrl) en un archivo binario (Blob)
            const responseBlob = await fetch(dataUrl);
            const blob = await responseBlob.blob();

            // Preparamos los datos para enviarlos al servidor del ordenador
            const formData = new FormData();
            formData.append('foto', blob, nombreArchivo);
            formData.append('matricula', matriculaText);
            formData.append('anio', nombreCarpetaAnio);

            // Petición HTTP al equipo (puedes cambiar el puerto :3000 si tu backend usa otro)
            const res = await fetch('http://192.168.13.190:3000/guardar-foto', {
                method: 'POST',
                body: formData
            });

            if(res.ok) {
                console.log('Foto guardada correctamente en el equipo.');
            } else {
                console.error('El servidor del equipo respondió con un error.');
            }

        } catch (err) {
            console.error("No se pudo conectar con el equipo en la IP 192.168.13.190. Verifica la red o el servidor.", err);
        }
        // -----------------------------------------------------

        // Crear elemento en la mini galería web local de la pantalla
        const thumbContainer = document.createElement('div');
        thumbContainer.className = 'thumb-container';
        
        const img = document.createElement('img');
        img.src = dataUrl;
        
        const label = document.createElement('div');
        label.className = 'thumb-label';
        label.innerText = matriculaText;

        thumbContainer.appendChild(img);
        thumbContainer.appendChild(label);
        grid.insertBefore(thumbContainer, grid.firstChild);

        // Limpiar el campo para agilizar el trabajo
        matriculaInput.value = '';
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error:", err));
        });
    }

    window.addEventListener('DOMContentLoaded', initCamera);
</script>

</body>
</html>
